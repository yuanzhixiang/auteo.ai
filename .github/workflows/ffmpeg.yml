name: ffmpeg

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. ffmpeg-b1)'
        required: true

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: brew install -q autoconf automake libtool pkg-config meson ninja
      - name: Cache dependency sources
        uses: actions/cache@v4
        with:
          path: .ffmpeg-build/darwin-arm64/src/*.tar.*
          key: ffmpeg-src-${{ hashFiles('scripts/ffmpeg-sources.env') }}
      - name: Build
        run: ./scripts/build-ffmpeg-macos.sh
      - name: Pack
        run: tar -C vendor/ffmpeg -czf ffmpeg-darwin-arm64.tar.gz darwin-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-darwin-arm64
          path: ffmpeg-darwin-arm64.tar.gz

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel autoconf automake libtool make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nasm
      - name: Cache dependency sources
        uses: actions/cache@v4
        with:
          path: .ffmpeg-build/win32-x64/src/*.tar.*
          key: ffmpeg-src-win-${{ hashFiles('scripts/ffmpeg-sources.env') }}
      - name: Build
        run: ./scripts/build-ffmpeg-msys2.sh
      - name: Pack
        run: tar -C vendor/ffmpeg -czf ffmpeg-win32-x64.tar.gz win32-x64
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win32-x64
          path: ffmpeg-win32-x64.tar.gz

  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Extract SOURCES.md
        run: tar -xzf ffmpeg-darwin-arm64.tar.gz darwin-arm64/SOURCES.md --strip-components=1
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ inputs.release_tag }}"
          ffmpeg-darwin-arm64.tar.gz ffmpeg-win32-x64.tar.gz SOURCES.md
          --title "LGPL ffmpeg sidecar ${{ inputs.release_tag }}"
          --notes "LGPL-only ffmpeg sidecar builds. SOURCES.md lists the exact source tarballs (LGPL source offer)."
