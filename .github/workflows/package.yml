name: package

on:
  workflow_dispatch:
    inputs:
      ffmpeg_tag:
        description: 'ffmpeg release tag to bundle (e.g. ffmpeg-b1)'
        required: true

jobs:
  mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Download ffmpeg sidecar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.ffmpeg_tag }}" -p 'ffmpeg-darwin-arm64.tar.gz'
          mkdir -p vendor/ffmpeg
          tar -xzf ffmpeg-darwin-arm64.tar.gz -C vendor/ffmpeg
      - run: npm ci
      - run: npm run typecheck && npm test
      - run: npm run build
      - name: Package (unsigned dmg)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: logcut-mac-arm64
          path: release/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Download ffmpeg sidecar
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release download "${{ inputs.ffmpeg_tag }}" -p 'ffmpeg-win32-x64.tar.gz'
          mkdir -p vendor/ffmpeg
          tar -xzf ffmpeg-win32-x64.tar.gz -C vendor/ffmpeg
      - run: npm ci
      - run: npm run typecheck && npm test
      - run: npm run build
      - name: Package (unsigned nsis)
        run: npx electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: logcut-win-x64
          path: release/*.exe
